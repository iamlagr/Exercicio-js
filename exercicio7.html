<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 7 - Controle de Estoque</title>
    <style>
        body { font-family: sans-serif; margin: 30px; background-color: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .res { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .sucesso { background-color: #d4edda; color: #155724; border-left: 5px solid #28a745; }
        .erro { background-color: #f8d7da; color: #721c24; border-left: 5px solid #dc3545; }
        button { background: #333; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Controle de Estoque Diário</h2>
        <p>Estoque Inicial: <strong>120 unidades</strong></p>

        <label>Quantidade vendida hoje:</label><br>
        <input type="number" id="vendaInput" placeholder="Ex: 50"><br><br>
        
        <button onclick="atualizarEstoque()">Registrar Venda</button>

        <div id="resultado" class="res" style="display:none;"></div>
    </div>

    <script>
        function atualizarEstoque() {
            const estoqueInicial = 120;
            const qtdVendida = parseInt(document.getElementById('vendaInput').value);
            const divRes = document.getElementById('resultado');

            divRes.style.display = "block";

            if (isNaN(qtdVendida) || qtdVendida < 0) {
                divRes.className = "res erro";
                divRes.innerHTML = "Por favor, insira uma quantidade válida.";
            } else if (qtdVendida > estoqueInicial) {
                // Desafio Adicional: Validação de estoque insuficiente
                divRes.className = "res erro";
                divRes.innerHTML = `<strong>Erro:</strong> Não há produtos suficientes no estoque.<br>Estoque disponível: ${estoqueInicial} unidades.`;
            } else {
                // Cálculo de estoque restante
                const estoqueRestante = estoqueInicial - qtdVendida;
                
                divRes.className = "res sucesso";
                divRes.innerHTML = 
                    `Estoque Inicial: ${estoqueInicial}<br>` +
                    `Quantidade Vendida: ${qtdVendida}<br>` +
                    `<strong>Estoque Atual: ${estoqueRestante} unidades</strong>`;
            }
        }
    </script>
</body>
</html>
