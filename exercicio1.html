<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1 - Papelaria</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .resultado { margin-top: 15px; font-weight: bold; color: blue; }
    </style>
</head>
<body>

    <h2>Calculadora de Compra - Cadernos</h2>
    <p>Preço unitário: <strong>R$ 12,50</strong></p>

    <label for="quantidade">Quantidade de cadernos:</label>
    <input type="number" id="quantidade" placeholder="Ex: 5" min="1">
    
    <button onclick="calcularTotal()">Calcular Valor Total</button>

    <div id="res" class="resultado"></div>

    <script>
        function calcularTotal() {
            // Pegamos o valor do input
            const qtd = document.getElementById('quantidade').value;
            const precoUnitario = 12.50;
            
            // Verificamos se a quantidade é válida
            if (qtd > 0) {
                const total = qtd * precoUnitario;
                
                // Exibimos o resultado formatado
                document.getElementById('res').innerHTML = 
                    `O valor total para ${qtd} cadernos é: R$ ${total.toFixed(2).replace('.', ',')}`;
            } else {
                document.getElementById('res').innerHTML = "Por favor, insira uma quantidade válida.";
                document.getElementById('res').style.color = "red";
            }
        }
    </script>


</body>
</html>
